# ASD 眼动筛查模型配置文件

# ── 数据相关 ──
data:
  data_dir: "data/Saliency4ASD"                # 数据集根目录，包含 ASD/ 和 TD/ 子文件夹
  image_size: 224                 # 模型输入分辨率
  resize_size: 256                # 训练时先 resize 到此尺寸再随机裁剪

# ── 数据增强 (仅训练时生效) ──
augmentation:
  flip_prob: 0.5                  # 随机水平翻转概率
  rotation_range: 15              # 随机旋转角度范围 ±degrees
  crop_scale: [0.8, 1.0]         # RandomResizedCrop 面积比例范围
  crop_ratio: [0.9, 1.1]         # RandomResizedCrop 宽高比范围
  brightness_range: [0.8, 1.2]   # RGB 亮度扰动范围（热力图不做此增强）

# ── 模型超参数 ──
model:
  gaze_channels: [32, 64, 128, 256, 256]   # GazeCNN 各层输出通道数（共 5 层）
  rgb_proj_dim: 256                         # RGB 特征投影维度（与热力图分支对等）
  classifier_hidden_dim: 512                # 融合后全连接隐藏层维度
  dropout: 0.5                              # 分类头 Dropout 比率

# ── 训练参数 ──
train:
  n_folds: 5                      # 分层交叉验证折数
  batch_size: 32                  # 批大小（视显存调整）
  lr: 1.0e-4                      # AdamW 学习率
  weight_decay: 1.0e-2            # AdamW 权重衰减
  num_epochs: 30                  # 总训练 epoch 数
  freeze_epochs: 10               # 前 N 个 epoch 冻结 ResNet-50
  num_workers: 4                  # DataLoader 工作进程数
  random_seed: 42                 # 交叉验证随机种子
  output_dir: "outputs"           # checkpoint 保存目录
  device: null                    # 训练设备 (null=自动检测, "cuda"/"mps"/"cpu")
